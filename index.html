<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Download Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }.container {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 350px;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #007bff;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

.file-box {
  background: #fafafa;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.hidden {
  display: none;
}

.error {
  color: red;
  margin-top: 10px;
}

.success {
  color: green;
  margin-top: 10px;
}

  </style>
</head>
<body><div class="container">
  <div id="loginPage">
    <h2>Enter 10 Digit PIN</h2>
    <input type="password" id="mainPin" maxlength="10" placeholder="Enter 10 Digit PIN">
    <button onclick="checkMainPin()">Open Files</button>
    <div id="mainError" class="error"></div>
  </div>  <div id="filesPage" class="hidden">
    <h2>Download Files</h2><div class="file-box">
  <p>File 1</p>
  <button onclick="downloadFile('1111', 'file1.pdf')">Download</button>
</div>

<div class="file-box">
  <p>File 2</p>
  <button onclick="downloadFile('2222', 'file2.pdf')">Download</button>
</div>

<div class="file-box">
  <p>File 3</p>
  <button onclick="downloadFile('3333', 'file3.pdf')">Download</button>
</div>

<div class="file-box">
  <p>File 4</p>
  <button onclick="downloadFile('4444', 'file4.pdf')">Download</button>
</div>

<div class="file-box">
  <p>File 5</p>
  <button onclick="downloadFile('5555', 'file5.pdf')">Download</button>
</div>

<div id="downloadMessage"></div>

  </div>
</div><script>
  // 10 digit main pin
  const correctMainPin = "1234567890";

  function checkMainPin() {
    const enteredPin = document.getElementById("mainPin").value;
    const errorBox = document.getElementById("mainError");

    if (enteredPin === correctMainPin) {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("filesPage").classList.remove("hidden");
    } else {
      errorBox.innerText = "Wrong 10 Digit PIN";
    }
  }

  function downloadFile(correctPin, fileName) {
    const enteredPin = prompt("Enter 4 Digit Download PIN");

    if (enteredPin === correctPin) {
      const link = document.createElement("a");
      link.href = fileName;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      document.getElementById("downloadMessage").innerHTML =
        `<p class='success'>${fileName} downloading...</p>`;
    } else {
      document.getElementById("downloadMessage").innerHTML =
        `<p class='error'>Wrong Download PIN for ${fileName}</p>`;
    }
  }
</script></body>
</html>
